<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>four fun</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css?family=IM+Fell+English:400&display=swap" rel="stylesheet">
</head>

<body>
  <!-- lives-container nur im main-content -->
  <header>
    <h1>StarCraft for Android ;)</h1>
  </header>
  <main>
    <section id="main-content">
      <div id="top-bar">
        <div id="lives-container">
          <div id="heart-row">
            <div id="heart-symbol-wrap">
              <span id="heart-symbol">❤️</span>
              <span id="lives-count">100</span>
            </div>
          </div>
          <div id="coins-row">
            <div id="coins-symbol-wrap">
              <span id="coins-symbol">🪙</span>
              <span id="coins-count">50</span>
            </div>
          </div>
          <div id="waves-row">
            <div id="waves-container">
              <span id="wave-symbol">🌊</span>
              <span id="waves-count">1</span>
            </div>
          </div>
        </div>
      </div>
      <div id="rts-root"></div>
    </section>
  </main>
  <footer>
    <p>&copy; 2026 Tower Defense</p>
  </footer>
  <script type="module" src="src/main.js"></script>
</body>

</html>
